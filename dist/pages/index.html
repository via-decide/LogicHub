<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logichub — Thinking Layer Before Coding</title>
  <meta name="description" content="Logichub is the planning engine before coding: Idea → Logichub → Zayvora → Daxini.">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'system-ui']
          }
        }
      }
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="../components/hero.js"></script>
  <script src="../components/features.js"></script>
  <script src="../components/workflow.js"></script>
  <script src="../components/ecosystem.js"></script>
  <script src="../components/workspace-ui.js"></script>
  <script src="../js/blueprint-save.js"></script>
  <script src="../js/blueprint-load.js"></script>
</head>
<body class="h-full bg-slate-100 dark:bg-slate-950 text-slate-900 dark:text-slate-100 antialiased">
  <div class="min-h-full">
    <header class="sticky top-0 z-20 border-b border-slate-200/70 dark:border-slate-800 bg-white/80 dark:bg-slate-950/80 backdrop-blur">
      <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
        <div class="font-semibold tracking-wide">LOGICHUB</div>
        <button id="themeToggle" class="text-xs px-3 py-2 rounded-lg border border-slate-300 dark:border-slate-700">Toggle Theme</button>
      </div>
    </header>

    <main id="app" class="max-w-7xl mx-auto px-4 md:px-6 py-8 md:py-10"></main>
  </div>

  <!-- Export Progress Modal -->
  <div id="exportProgressModal" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/80 backdrop-blur-sm hidden">
    <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 w-full max-w-md shadow-2xl">
      <div class="flex items-center justify-between mb-4">
        <h3 class="text-base font-bold text-white">Packaging Production Bundle</h3>
        <span id="exportProgressPercent" class="text-sm font-semibold text-cyan-400">0%</span>
      </div>
      <div class="w-full bg-slate-800 h-2 rounded-full overflow-hidden mb-4">
        <div id="exportProgressBar" class="bg-cyan-500 h-full w-0 transition-all duration-300"></div>
      </div>
      <p id="exportProgressStatus" class="text-xs text-slate-400 font-mono">Initializing build pipeline...</p>
    </div>
  </div>

  <script>
    const c = window.LogicHubComponents;
    const app = document.getElementById('app');

    app.innerHTML = [
      c.heroSection(),
      c.featureGrid(),
      c.workflowSteps(),
      `
      <section class="py-14">
        <h2 class="text-2xl md:text-3xl font-semibold text-slate-900 dark:text-white">Generated Output Preview</h2>
        <p class="mt-3 text-slate-600 dark:text-slate-300">Logichub produces structured code scaffolds your team can extend instantly.</p>
        <div class="mt-7 rounded-2xl border border-slate-200 dark:border-slate-800 bg-slate-950 text-emerald-300 p-6 font-mono text-sm">
/project<br>
&nbsp;&nbsp;app.js<br>
&nbsp;&nbsp;style.css<br>
&nbsp;&nbsp;manifest.json<br>
&nbsp;&nbsp;sw.js
        </div>
      </section>
      `,
      c.ecosystemDiagram(),
      c.workspaceCanvas(),
      `
      <section class="py-14">
        <div class="rounded-3xl border border-slate-200 dark:border-slate-800 bg-gradient-to-br from-cyan-600 to-violet-700 text-white p-8 md:p-12">
          <h2 class="text-3xl md:text-4xl font-semibold">Start Planning Your System</h2>
          <div class="mt-6 flex flex-wrap gap-3">
            <button class="px-5 py-3 rounded-xl bg-white text-slate-900 font-semibold" onclick="location.href='../index.html'">Open Logichub Workspace</button>
            <button class="px-5 py-3 rounded-xl border border-white/60 font-semibold">Explore Zayvora</button>
          </div>
        </div>
      </section>
      `
    ].join('');

    document.getElementById('themeToggle').addEventListener('click', () => {
      document.documentElement.classList.toggle('dark');
    });

    if (window.LogicHubBlueprint && window.LogicHubBlueprint.initBlueprintLoad) {
      window.LogicHubBlueprint.initBlueprintLoad();
    }

    const saveButton = document.getElementById('saveBlueprintBtn');
    if (saveButton) {
      saveButton.addEventListener('click', () => {
        window.LogicHubBlueprint.saveBlueprint();
      });
    }

    const shareButton = document.getElementById('shareBlueprintBtn');
    if (shareButton) {
      shareButton.addEventListener('click', () => {
        window.LogicHubBlueprint.shareBlueprint();
      });
    }

    // Dynamic JSZip injection and ZIP compiler helper
    function triggerZipExport() {
      if (typeof JSZip === 'undefined') {
        const script = document.createElement('script');
        script.src = 'https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js';
        script.onload = () => runZipGeneration();
        document.head.appendChild(script);
      } else {
        runZipGeneration();
      }
    }

    function runZipGeneration() {
      const modal = document.getElementById('exportProgressModal');
      const progressBar = document.getElementById('exportProgressBar');
      const progressPercent = document.getElementById('exportProgressPercent');
      const progressStatus = document.getElementById('exportProgressStatus');

      if (!modal) return;
      modal.classList.remove('hidden');

      const steps = [
        { percent: 15, status: "Parsing blueprint canvas nodes...", delay: 400 },
        { percent: 35, status: "Compiling index.html app markup...", delay: 400 },
        { percent: 60, status: "Generating app.js runtime module...", delay: 500 },
        { percent: 80, status: "Synthesizing manifest.json and metadata.json...", delay: 400 },
        { percent: 95, status: "Injecting offline Service Worker (sw.js)...", delay: 400 },
        { percent: 100, status: "Optimizing code files. Zip compiled!", delay: 300 }
      ];

      let currentStep = 0;
      
      function executeStep() {
        if (currentStep < steps.length) {
          const step = steps[currentStep];
          progressBar.style.width = `${step.percent}%`;
          progressPercent.textContent = `${step.percent}%`;
          progressStatus.textContent = step.status;
          currentStep++;
          setTimeout(executeStep, step.delay);
        } else {
          generateZipBlob();
        }
      }

      executeStep();
    }

    function generateZipBlob() {
      const state = (window.LogicHubBlueprint && typeof window.LogicHubBlueprint.collectCanvasState === 'function')
        ? window.LogicHubBlueprint.collectCanvasState()
        : { name: 'LogicHub Generated App', nodes: [], edges: [] };

      const appName = state.name || 'LogicHub Generated App';
      const slug = (window.LogicHubBlueprint && typeof window.LogicHubBlueprint.slugify === 'function')
        ? window.LogicHubBlueprint.slugify(appName)
        : 'logichub-app';

      const zip = new JSZip();

      const nodeItems = state.nodes.map(n => `
        <div class="node-item">
          <span>Component ID: ${n.id}</span>
          <span class="node-type">${n.type}</span>
        </div>
      `).join('\n');

      const indexHtml = `<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>\${appName}</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background: #05070f; color: #f1f5f9; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    .card { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255,255,255,0.06); border-radius: 16px; padding: 32px; max-width: 420px; width: 90%; text-align: center; box-shadow: 0 10px 45px rgba(0,0,0,0.6); backdrop-filter: blur(16px); }
    h1 { margin: 0 0 8px 0; font-size: 24px; color: #06b6d4; }
    p { color: #94a3b8; font-size: 14px; line-height: 1.6; margin: 0 0 24px 0; }
    .node-list { display: flex; flex-direction: column; gap: 8px; text-align: left; margin-bottom: 24px; }
    .node-item { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.04); padding: 12px; border-radius: 8px; font-size: 13px; font-family: monospace; display: flex; justify-content: space-between; }
    .node-type { color: #10b981; font-weight: bold; text-transform: uppercase; }
    .btn { background: #0284c7; color: #fff; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: 600; width: 100%; transition: background 0.2s; }
    .btn:hover { background: #0369a1; }
  </style>
</head>
<body>
  <div class="card">
    <h1>\${appName}</h1>
    <p>An independent application built via LogicHub. Featuring modular components linked via active blueprints.</p>
    <div class="node-list">
      \${nodeItems || '<div class="text-xs text-slate-500">No nodes defined in blueprint.</div>'}
    </div>
    <button class="btn" onclick="alert('App workspace initialized!')">Launch App Workspace</button>
  </div>
</body>
</html>`;

      const appJs = `/**
 * app.js - LogicHub Autogenerated Runtime Script
 */
console.log("Initializing \${appName} compiled app runtime...");
const appConfig = \${JSON.stringify({ appName, slug, nodes: state.nodes, edges: state.edges }, null, 2)};
console.log("Loaded configuration:", appConfig);
`;

      const styleCss = `/* styles.css - autogenerated by LogicHub */
:root {
  --bg-primary: #05070f;
  --accent: #06b6d4;
}
body { background-color: var(--bg-primary); }
`;

      const manifestJson = {
        short_name: appName.substring(0, 12),
        name: appName,
        start_url: "./index.html",
        display: "standalone",
        theme_color: "#05070f",
        background_color: "#05070f"
      };

      const metadataJson = {
        name: appName,
        description: "An independent application built via LogicHub.",
        icon: "⚡",
        entryUrl: "index.html",
        permissions: ["local-storage", "notifications"],
        version: "1.0.0",
        publishedAt: new Date().toISOString()
      };

      zip.file("index.html", indexHtml);
      zip.file("app.js", appJs);
      zip.file("style.css", styleCss);
      zip.file("manifest.json", JSON.stringify(manifestJson, null, 2));
      zip.file("metadata.json", JSON.stringify(metadataJson, null, 2));
      zip.file("project.logic.json", JSON.stringify(state, null, 2));

      zip.generateAsync({ type: "blob" }).then((blob) => {
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = `\${slug}.zip`;
        link.click();
        URL.revokeObjectURL(url);
        
        setTimeout(() => {
          document.getElementById('exportProgressModal').classList.add('hidden');
        }, 300);
      });
    }

    const exportButton = document.getElementById('exportZipBtn');
    if (exportButton) {
      exportButton.addEventListener('click', () => {
        triggerZipExport();
      });
    }

    const generateButton = document.getElementById('generateAppBtn');
    if (generateButton) {
      generateButton.addEventListener('click', () => {
        const status = document.getElementById('blueprintStatus');
        if (status) {
          status.textContent = 'Blueprint ready. Generation pipeline can now consume saved architecture JSON.';
        }
      });
    }
  </script>
</body>
</html>
