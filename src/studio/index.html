<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LogicHub Studio</title>
  <style>
    :root {
      --bg: #06080f;
      --panel: #0f1320;
      --panel-soft: #141a2b;
      --accent: #4ec9f5;
      --text: #e7ecff;
      --muted: #91a0c8;
      --border: rgba(145,160,200,0.25);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, sans-serif;
      background: radial-gradient(circle at top left, #152448 0%, var(--bg) 44%);
      color: var(--text);
      min-height: 100vh;
    }
    .studio {
      display: grid;
      grid-template-columns: 260px 1fr 320px;
      gap: 12px;
      padding: 12px;
      min-height: 100vh;
    }
    .panel {
      background: linear-gradient(160deg, var(--panel-soft), var(--panel));
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
    }
    .panel h2, .panel h3 {
      margin: 0 0 10px;
      font-size: 0.95rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .library { display: grid; gap: 8px; }
    .lh-lib-item {
      border: 1px solid var(--border);
      background: rgba(0,0,0,0.18);
      color: var(--text);
      border-radius: 10px;
      padding: 10px;
      display: grid;
      gap: 4px;
      text-align: left;
      cursor: grab;
    }
    .lh-lib-item span { color: var(--muted); font-size: 0.78rem; }
    .workspace {
      position: relative;
      overflow: hidden;
      min-height: 80vh;
    }
    .canvas {
      position: relative;
      height: 100%;
      border-radius: 12px;
      background-image: linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
      background-size: 28px 28px;
    }
    .canvas svg,
    .node-layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }
    .lh-edge {
      stroke: var(--accent);
      stroke-width: 2;
      fill: none;
      opacity: 0.8;
    }
    .lh-node {
      position: absolute;
      width: 184px;
      border: 1px solid rgba(78,201,245,0.35);
      border-radius: 10px;
      background: #0b0f1a;
      padding: 10px;
      cursor: move;
      display: grid;
      gap: 7px;
    }
    .lh-node.is-selected {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(78,201,245,0.28);
    }
    .lh-node header {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
    }
    .lh-node h4 { margin: 0; font-size: 0.86rem; }
    .lh-node p { margin: 0; color: var(--muted); font-size: 0.75rem; }
    .lh-link-port {
      justify-self: end;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: rgba(78,201,245,0.15);
      color: var(--accent);
      cursor: pointer;
    }
    .editor label {
      display: grid;
      gap: 6px;
      margin-bottom: 10px;
      font-size: 0.78rem;
      color: var(--muted);
    }
    .editor input,
    .editor textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: rgba(0,0,0,0.18);
      color: var(--text);
      padding: 8px;
      font: inherit;
    }
    .lh-preview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 8px;
      margin-bottom: 10px;
    }
    .lh-preview-grid article {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px;
      background: rgba(0,0,0,0.15);
    }
    .lh-preview-grid h5 { margin: 0 0 2px; }
    pre {
      margin: 0;
      max-height: 170px;
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px;
      font-size: 0.72rem;
      background: rgba(0,0,0,0.2);
      color: #d9f6ff;
    }
    .lh-empty,
    .lh-footnote { color: var(--muted); font-size: 0.78rem; }
    .zayvora textarea {
      width: 100%;
      min-height: 84px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: rgba(0,0,0,0.18);
      color: var(--text);
      padding: 8px;
      margin-bottom: 8px;
      font: inherit;
    }
    .zayvora button {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: rgba(78,201,245,0.22);
      color: var(--text);
      font-weight: 600;
      padding: 8px 10px;
      cursor: pointer;
      width: 100%;
    }
    #simulateDeployBtn {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: rgba(78,201,245,0.22);
      color: var(--text);
      font-weight: 600;
      padding: 8px 10px;
      cursor: pointer;
    }
    @media (max-width: 1100px) {
      .studio { grid-template-columns: 1fr; }
      .workspace { min-height: 55vh; }
    }
  </style>
</head>
<body>
  <main class="studio">
    <aside class="panel">
      <h2>Component Library</h2>
      <section id="componentLibrary" class="library"></section>
    </aside>

    <section class="panel workspace">
      <h2>Builder Canvas</h2>
      <div id="builderCanvas" class="canvas">
        <svg id="edgeLayer" aria-hidden="true"></svg>
        <div id="nodeLayer" class="node-layer"></div>
      </div>
    </section>

    <aside class="panel">
      <section class="zayvora">
        <h3>Zayvora Prompt</h3>
        <textarea id="zayvoraPrompt" placeholder="Describe the workflow you want generated..."></textarea>
        <button type="button" id="generateWorkflowBtn">Generate Workflow</button>
        <p id="zayvoraStatus" class="lh-footnote">Enter a prompt to auto-generate a workflow graph.</p>
      </section>
      <section>
        <h3>Node Editor</h3>
        <form id="nodeEditorForm" class="editor">
          <label>Node Title <input type="text" name="title" disabled></label>
          <label>Description <textarea name="description" rows="3" disabled></textarea></label>
        </form>
        <p id="nodeEditorHelper" class="lh-footnote">Select a node on the canvas to edit its label and details.</p>
      </section>
      <section>
        <h3>Live Preview</h3>
        <div id="previewPanel"></div>
      </section>
      <section>
        <h3>Deployment Panel</h3>
        <div id="deploymentPanel"></div>
      </section>
    </aside>
  </main>

  <script src="../components/library/component-library.jsx"></script>
  <script src="../components/builder/flow-graph.jsx"></script>
  <script src="../components/builder/builder-canvas.jsx"></script>
  <script src="../components/builder/node-editor.jsx"></script>
  <script src="../engine/workflow/workflow-parser.js"></script>
  <script src="../engine/workflow/execution-validator.js"></script>
  <script src="../engine/workflow/node-compiler.js"></script>
  <script src="../engine/workflow/workflow-runtime.js"></script>
  <script src="../components/preview/preview-panel.jsx"></script>
  <script src="../components/preview/deployment-panel.jsx"></script>
  <script src="../integrations/zayvora/zayvora-bridge.js"></script>
  <script src="../integrations/zayvora/task-interpreter.js"></script>
  <script src="../integrations/zayvora/workflow-generator.js"></script>
  <script>
    var state = window.LogicHubStudioGraph.createGraphState();

    var context = {
      state: state,
      canvas: document.getElementById('builderCanvas'),
      canvasEdgeLayer: document.getElementById('edgeLayer'),
      canvasNodeLayer: document.getElementById('nodeLayer'),
      nodeEditorForm: document.getElementById('nodeEditorForm'),
      nodeEditorHelper: document.getElementById('nodeEditorHelper'),
      previewPanel: document.getElementById('previewPanel'),
      deploymentPanel: document.getElementById('deploymentPanel'),
      zayvoraPrompt: document.getElementById('zayvoraPrompt'),
      zayvoraStatus: document.getElementById('zayvoraStatus'),
      runtimeHandlers: {
        Research: function (step, payload) { return Object.assign({}, payload, { research: 'gathered:' + step.title }); },
        'Data Processor': function (step, payload) { return Object.assign({}, payload, { processed: true }); },
        'UI Generator': function (step, payload) { return Object.assign({}, payload, { ui: 'render-ready' }); },
        Output: function (step, payload) { return Object.assign({}, payload, { output: payload }); }
      },
      onStateChange: function () {
        if (context.syncEditor) context.syncEditor();
        window.LogicHubStudioPreview.renderPreview(context);
        window.LogicHubStudioDeploy.renderDeploymentPanel(context);
      }
    };

    window.LogicHubStudioLibrary.renderLibrary(document.getElementById('componentLibrary'));
    window.LogicHubStudioNodeEditor.setupNodeEditor(context);
    window.LogicHubStudioCanvas.setupBuilderCanvas(context);
    connectZayvoraGeneration();
    context.onStateChange();

    function loadGeneratedGraph(generated) {
      context.state.nodes = generated.graph.nodes;
      context.state.edges = generated.graph.edges;
      context.state.idCounter = generated.graph.nodes.length;
      context.state.selectedNodeId = generated.graph.nodes.length ? generated.graph.nodes[0].id : null;
      context.state.activeLinkSourceId = null;
      window.LogicHubStudioCanvas.renderCanvasElements(context);
      context.onStateChange();
    }

    function connectZayvoraGeneration() {
      var generateButton = document.getElementById('generateWorkflowBtn');
      if (!generateButton) return;

      generateButton.addEventListener('click', function () {
        var promptValue = context.zayvoraPrompt.value.trim();
        if (!promptValue) {
          context.zayvoraStatus.textContent = 'Please enter a prompt before generating.';
          return;
        }

        var reasoning = window.LogicHubZayvoraBridge.reasonOverPrompt(promptValue);
        var structuredTask = window.LogicHubTaskInterpreter.interpretReasoning(reasoning);
        var generated = window.LogicHubWorkflowGenerator.generateWorkflow(structuredTask);

        loadGeneratedGraph(generated);
        context.zayvoraStatus.textContent = 'Generated workflow for intent "' + reasoning.intent + '" (' + structuredTask.steps.length + ' nodes).';
      });
    }
  </script>
</body>
</html>
