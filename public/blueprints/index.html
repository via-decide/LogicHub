<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logichub Blueprint Library</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'system-ui']
          }
        }
      }
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="../js/blueprint-save.js"></script>
  <script src="../js/blueprint-library.js"></script>
</head>
<body class="h-full bg-slate-100 dark:bg-slate-950 text-slate-900 dark:text-slate-100 antialiased">
  <div class="min-h-full max-w-6xl mx-auto px-4 py-8">
    <header class="flex flex-wrap items-center justify-between gap-4">
      <div>
        <h1 class="text-3xl md:text-4xl font-semibold">Public Blueprint Library</h1>
        <p class="mt-2 text-sm text-slate-600 dark:text-slate-300">Explore community templates and open them instantly in Logichub.</p>
      </div>
      <a href="../pages/index.html" class="px-4 py-2 rounded-xl border border-slate-300 dark:border-slate-700 text-sm">Open Workspace</a>
    </header>

    <main id="blueprintLibraryGrid" class="mt-8 grid md:grid-cols-2 lg:grid-cols-3 gap-4"></main>
  </div>

  <script>
    if (window.LogicHubBlueprintLibrary) {
      window.LogicHubBlueprintLibrary.initBlueprintLibrary();
    }
  </script>
</body>
</html>
